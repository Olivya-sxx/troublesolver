            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

            font-size: 1.3em;

            border-radius: 12px;

            font-size: 13px;
            color: #999;

            color: #fff;

            box-shadow: 0 6px 20px rgba(0,0,0,0.2);

            border-color: #6366f1;
            color: #c7d2fe;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
        }
        .solutions-panel {
            background: linear-gradient(145deg, #1a1a2e, #16162a);
            border: 1px solid #2a2a4a;
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 25px;
            display: none;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .solutions-panel.show { display: block; }
        .solutions-title {
            font-size: 1.3em;
            margin-bottom: 25px;
            color: #a5b4fc;
            font-weight: 400;
        }
        .solution-cards { display: flex; flex-direction: column; gap: 12px; }
        .solution-card {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 20px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            color: #c7d2fe;
            font-size: 15px;
        }
        .solution-card:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
            padding-left: 30px;
        }
        .solution-card .arrow {
            opacity: 0.5;
            transition: all 0.3s ease;
        }
        .solution-card:hover .arrow {
            opacity: 1;
            transform: translateX(5px);
        }
        .detail-panel {
            background: #fefefe;
            color: #1a1a2e;
            border-radius: 20px;
            padding: 45px;
            display: none;
            animation: fadeIn 0.4s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .detail-panel.show { display: block; }
        .detail-title {
            font-size: 1.5em;
            color: #4f46e5;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e5e7eb;
            font-weight: 500;
            line-height: 1.5;
        }
        .detail-content {
            white-space: pre-wrap;
            font-size: 16px;
            line-height: 2;
            color: #333;
        }
        .back-btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 35px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(79, 70, 229, 0.4);
        }
        .hint {
            text-align: center;
            color: #444;
            font-size: 13px;
            margin-top: 30px;
        }
        @media (max-width: 600px) {
            h1 { font-size: 1.8em; letter-spacing: 4px; }
            .trouble-list { grid-template-columns: repeat(2, 1fr); }
            .detail-panel { padding: 30px 25px; }
        }
    </style>
</head>

        solutionDetails["情况比你想象的更糟"] = {
            title: "情况比你想象的更糟：失败是一种解脱",
            content: "你是一个生而有限的人（你的时间有限，你对时间的控制也有限），人生真的比你想象的要糟糕得多。事实上，它毫无希望可言。\n\n慈友禅师的见解是，增加负担—帮助他们看到自己的处境根本不可救药，从而允许自己停止挣扎—往往是更仁慈、更有效的做法。\n\n我们真正的问题出在竟然以为生而有限的人能够掌控人生，得到安全感。毕竟，我们无法摆脱人生，并因此而受到种种限制，感到窒息，找不到逃生通道。\n\n当你意识到你的处境比你想象的还要糟糕时，你就不再需要在生活中时时摆出防冲撞姿势，拼命祈祷有人能阻止飞机坠毁了。\n\n你明白，飞机已经坠毁了（你一出生，你乘坐的飞机就已经坠毁）。你已经被困在荒岛上，只能和其他幸存者一起尽力活下去。"

        function renderTroubleList() {
            var container = document.getElementById('troubleList');
            var html = '<div class="categories-grid">';
            for (var c = 0; c < categories.length; c++) {
                var cat = categories[c];
                html += '<div class="category">';
                html += '<div class="category-header">';
                html += '<div class="category-icon" style="background:' + cat.color + '">' + cat.icon + '</div>';
                html += '<span class="category-name">' + cat.name + '</span>';
                html += '</div>';
                html += '<div class="trouble-list">';
                for (var i = 0; i < cat.items.length; i++) {
                    var name = cat.items[i];
                    var label = name.replace('_苦恼', '');
                    html += '<div class="trouble-item" onclick="selectTrouble(\'' + name + '\')">' + label + '</div>';
                }
                html += '</div></div>';
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function selectTrouble(trouble) {
            var items = document.querySelectorAll('.trouble-item');
            for (var i = 0; i < items.length; i++) {
                items[i].classList.remove('active');
                if (items[i].textContent === trouble) {
                    items[i].classList.add('active');
                }
            }
            var solutions = troubleIndex[trouble];
            var displayName = trouble.replace('_苦恼', '');
            document.getElementById('solutionsTitle').textContent = '「' + displayName + '」的解法';
            var cardsHtml = '';
            for (var i = 0; i < solutions.length; i++) {
                cardsHtml += '<div class="solution-card" onclick="showDetail(\'' + solutions[i] + '\')"><span>' + solutions[i] + '</span><span class="arrow">→</span></div>';
            }
            document.getElementById('solutionCards').innerHTML = cardsHtml;
            document.getElementById('solutionsPanel').classList.add('show');
            document.getElementById('detailPanel').classList.remove('show');
            document.getElementById('solutionsPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function showDetail(solution) {
            var detail = solutionDetails[solution];
            if (detail) {
                document.getElementById('detailTitle').textContent = detail.title;
                document.getElementById('detailContent').textContent = detail.content;
                document.getElementById('detailPanel').classList.add('show');
                document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function goBackToSolutions() {
            document.getElementById('detailPanel').classList.remove('show');
            document.getElementById('solutionsPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
