<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="一个从当前困扰出发，快速找到对应行动提醒的中文自助网页。"
    />
    <meta name="theme-color" content="#f7f7f2" />
    <meta property="og:title" content="苦恼索引急救站" />
    <meta
      property="og:description"
      content="输入焦虑、拖延、分心、写作瓶颈等困扰，获得一个可以立刻开始的小行动。"
    />
    <meta property="og:type" content="website" />
    <title>苦恼索引急救站</title>
    <style>
      :root {
        --ink: #18211f;
        --muted: #64706c;
        --paper: #f7f7f2;
        --panel: #ffffff;
        --line: #dde2dc;
        --green: #2e7d5b;
        --blue: #315fa8;
        --coral: #d7634d;
        --gold: #d49a2a;
        --lilac: #8065b0;
        --shadow: 0 18px 48px rgba(24, 33, 31, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 12% 0%, rgba(46, 125, 91, 0.14), transparent 28rem),
          radial-gradient(circle at 88% 8%, rgba(49, 95, 168, 0.12), transparent 24rem),
          linear-gradient(180deg, #fbfbf6, var(--paper));
        color: var(--ink);
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
        letter-spacing: 0;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        width: min(1220px, calc(100% - 28px));
        margin: 0 auto;
        padding: 26px 0 40px;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: end;
        margin-bottom: 20px;
      }

      .brand {
        display: flex;
        gap: 14px;
        align-items: center;
        min-width: 0;
      }

      .mark {
        width: 52px;
        height: 52px;
        border-radius: 8px;
        color: #fff;
        background:
          linear-gradient(135deg, rgba(255,255,255,0.22), transparent),
          conic-gradient(from 190deg, var(--green), var(--blue), var(--gold), var(--coral), var(--green));
        display: grid;
        place-items: center;
        box-shadow: var(--shadow);
        flex: 0 0 auto;
      }

      .mark svg {
        width: 30px;
        height: 30px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 4.5vw, 3.1rem);
        line-height: 1.04;
      }

      .subtitle {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.5;
        max-width: 760px;
      }

      .source-pill {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255,255,255,0.75);
        color: var(--muted);
        padding: 8px 13px;
        white-space: nowrap;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(260px, 0.88fr) minmax(0, 1.45fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        background: rgba(255,255,255,0.92);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        overflow: clip;
      }

      .side {
        position: sticky;
        top: 14px;
        max-height: calc(100vh - 28px);
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
      }

      .section {
        padding: 16px;
      }

      .section + .section {
        border-top: 1px solid var(--line);
      }

      .search {
        display: grid;
        gap: 10px;
      }

      label {
        color: var(--muted);
        font-size: 0.9rem;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 44px;
        padding: 0 13px;
        color: var(--ink);
        background: #fff;
        outline: none;
      }

      input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(49, 95, 168, 0.13);
      }

      .quick-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        min-height: 32px;
        padding: 6px 11px;
        background: #fff;
        color: var(--muted);
      }

      .chip.is-active {
        color: #fff;
        border-color: var(--green);
        background: var(--green);
      }

      .dilemma-list {
        overflow: auto;
        padding: 10px;
        display: grid;
        gap: 8px;
      }

      .dilemma {
        width: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        text-align: left;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px 12px;
        background: #fff;
        color: var(--ink);
        min-height: 52px;
      }

      .dilemma:hover {
        border-color: rgba(49, 95, 168, 0.42);
      }

      .dilemma.is-active {
        border-color: rgba(46, 125, 91, 0.55);
        background: rgba(46, 125, 91, 0.09);
      }

      .dilemma small {
        color: var(--muted);
      }

      .main {
        display: grid;
        gap: 18px;
      }

      .hero {
        min-height: 260px;
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(260px, 0.72fr);
        align-items: stretch;
        overflow: hidden;
      }

      .hero-copy {
        padding: 24px;
        display: grid;
        align-content: center;
        gap: 16px;
      }

      .hero-copy h2 {
        margin: 0;
        font-size: clamp(1.55rem, 4vw, 2.55rem);
        line-height: 1.08;
      }

      .hero-copy p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
        max-width: 690px;
      }

      .book-visual {
        min-height: 260px;
        background:
          linear-gradient(130deg, rgba(24,33,31,0.06), rgba(255,255,255,0)),
          #edf2ee;
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
      }

      .book-visual::before {
        content: "";
        width: min(72%, 290px);
        aspect-ratio: 0.72;
        border-radius: 8px;
        background:
          linear-gradient(90deg, rgba(0,0,0,0.12), transparent 10%, transparent 88%, rgba(255,255,255,0.35)),
          linear-gradient(150deg, #375f53, #315fa8 54%, #d49a2a);
        box-shadow: 0 24px 52px rgba(24,33,31,0.22);
        transform: rotate(-6deg);
      }

      .book-visual::after {
        content: "FOUR WEEKS";
        position: absolute;
        color: rgba(255,255,255,0.86);
        font-weight: 900;
        letter-spacing: 0.08em;
        transform: rotate(-6deg);
        top: 42%;
        font-size: clamp(1.2rem, 3vw, 2rem);
      }

      .result-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 18px 18px 0;
      }

      .result-head h2 {
        margin: 0;
        font-size: 1.25rem;
      }

      .method-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        padding: 16px 18px 18px;
      }

      .method-card {
        min-height: 190px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        padding: 16px;
        text-align: left;
        display: grid;
        align-content: start;
        gap: 10px;
      }

      .method-card:hover,
      .method-card.is-active {
        border-color: rgba(46, 125, 91, 0.55);
        box-shadow: 0 12px 30px rgba(24, 33, 31, 0.1);
      }

      .method-tag {
        width: fit-content;
        border-radius: 999px;
        padding: 4px 9px;
        color: #fff;
        background: var(--blue);
        font-size: 0.78rem;
      }

      .method-card:nth-child(2) .method-tag {
        background: var(--coral);
      }

      .method-card:nth-child(3) .method-tag {
        background: var(--green);
      }

      .method-card:nth-child(4) .method-tag {
        background: var(--gold);
      }

      .method-card h3 {
        margin: 0;
        font-size: 1.08rem;
        line-height: 1.32;
      }

      .method-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .detail {
        padding: 18px;
        display: grid;
        gap: 16px;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: minmax(0, 0.78fr) minmax(0, 1.22fr);
        gap: 14px;
      }

      .note {
        border: 1px solid var(--line);
        border-left: 4px solid var(--green);
        border-radius: 8px;
        background: #fff;
        padding: 15px;
        display: grid;
        gap: 8px;
      }

      .note h3 {
        margin: 0;
        font-size: 1rem;
      }

      .note p,
      .note li {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .quote {
        border: 1px solid rgba(49,95,168,0.2);
        background: rgba(49,95,168,0.06);
        border-radius: 8px;
        padding: 16px;
        line-height: 1.75;
      }

      .steps {
        margin: 0;
        padding-left: 1.2rem;
        display: grid;
        gap: 7px;
      }

      .empty {
        padding: 18px;
        color: var(--muted);
        border-top: 1px solid var(--line);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .primary,
      .secondary {
        min-height: 42px;
        border-radius: 8px;
        padding: 0 14px;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
      }

      .primary {
        background: var(--green);
        color: #fff;
        font-weight: 800;
      }

      .secondary {
        color: var(--ink);
        background: #eef3ef;
        border: 1px solid var(--line);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%) translateY(18px);
        opacity: 0;
        pointer-events: none;
        color: #fff;
        background: var(--ink);
        padding: 11px 14px;
        border-radius: 8px;
        box-shadow: var(--shadow);
        transition: opacity 0.18s ease, transform 0.18s ease;
        max-width: min(92vw, 560px);
      }

      .toast.is-open {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      @media (max-width: 930px) {
        .topbar,
        .layout,
        .hero,
        .detail-grid {
          grid-template-columns: 1fr;
        }

        .side {
          position: static;
          max-height: none;
        }

        .dilemma-list {
          max-height: 360px;
        }

        .method-grid {
          grid-template-columns: 1fr;
        }

        .source-pill {
          white-space: normal;
        }
      }

      @media (max-width: 540px) {
        .app {
          width: min(100% - 18px, 1220px);
          padding-top: 14px;
        }

        .brand {
          align-items: flex-start;
        }

        .mark {
          width: 44px;
          height: 44px;
        }

        .hero-copy,
        .section,
        .detail {
          padding: 14px;
        }

        .result-head {
          display: grid;
          padding: 14px 14px 0;
        }

        .method-grid {
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 19c3-3 7-4 12-3" />
              <path d="M6 5h12v14H6z" />
              <path d="M9 8h6" />
              <path d="M9 11h4" />
            </svg>
          </div>
          <div>
            <h1>苦恼索引急救站</h1>
            <div class="subtitle">从“我现在卡在哪”出发，跳到《四周》里对应的几个不完美主义方法。先找一个能松动现实的小动作。</div>
          </div>
        </div>
        <div class="source-pill">静态网页 · 手机和电脑都能使用</div>
      </header>

      <div class="layout">
        <aside class="panel side" aria-label="苦恼选择">
          <section class="section search">
            <label for="searchInput">现在面对的困扰</label>
            <input id="searchInput" autocomplete="off" placeholder="输入：写作、拖延、焦虑、完美主义..." />
          </section>
          <section class="section">
            <div class="quick-row" id="quickFilters" aria-label="快速筛选"></div>
          </section>
          <div class="dilemma-list" id="dilemmaList"></div>
        </aside>

        <section class="main">
          <section class="panel hero" aria-label="当前选择">
            <div class="hero-copy">
              <div class="chip" id="statusChip">已选：写作瓶颈</div>
              <h2 id="heroTitle">写作瓶颈</h2>
              <p id="heroCopy">卡住时不需要先变成理想中的创作者。先从三个方向松动：承认失败带来的解脱、划出三小时的重点、用数量目标绕过内心质检员。</p>
              <div class="toolbar">
                <button class="primary" id="randomPick">随机抽一个困扰</button>
                <button class="secondary" id="copyPrompt">复制今日提醒</button>
                <button class="secondary" id="copyLink">复制网站链接</button>
              </div>
            </div>
            <div class="book-visual" aria-hidden="true"></div>
          </section>

          <section class="panel" aria-label="推荐方法">
            <div class="result-head">
              <h2>书中给你的三个方向</h2>
              <span class="chip" id="methodCount">3 个方法</span>
            </div>
            <div class="method-grid" id="methodGrid"></div>
          </section>

          <section class="panel" aria-label="方法详情">
            <div class="detail" id="detail"></div>
          </section>
        </section>
      </div>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      const methods = {
        "情况比你想象的更糟：失败是一种解脱": {
          short: "别再假装一切可以彻底掌控。承认有限，反而能停止无谓挣扎。",
          reminder: "如果事情本来就没有完美出路，你就可以少花一点力气维护幻觉，多花一点力气活在现场。",
          quote: "文档说：你是一个生而有限的人，时间和控制力都有限。看清处境不可救药，往往能让人停止挣扎；当你明白“飞机已经坠毁”，就不必一直摆出防冲撞姿势。",
          steps: ["写下这件事最坏会糟到哪里。", "删掉一个“我必须完全掌控”的要求。", "问：在这个已经不完美的现场里，我还能做哪一个小动作？"]
        },
        "皮艇和超级游艇：说做就做": {
          short: "不用等系统、计划、习惯都齐备。此刻值得做的一件事，可以直接做。",
          reminder: "先练习愿意做“一次性的小事”，不要把每个动作都变成自我改造工程。",
          quote: "文档提醒：重点是培养一种意愿，乐意在此时此地做一件仅此一回的事情。你做这件事，不是为了自我提升计划，而是因为它本身值得做。",
          steps: ["把任务缩成一个 5 分钟动作。", "不要设计长期系统，只启动一次。", "做完后记录：我刚刚完成了什么。"]
        },
        "你只需承担后果：付出代价": {
          short: "选择不是寻找零代价答案，而是看清代价并决定是否愿意付。",
          reminder: "自由不是没有限制，而是在限制里清醒地权衡。",
          quote: "文档说：人生路上做任何一次选择时，只需要问两个问题：代价是什么，是否值得付出。只要本着勇于面对后果的精神，结果都将是有限人类能享受的自由。",
          steps: ["列出选 A 的代价。", "列出不选 A 的代价。", "选一个你愿意承担后果的方向，并做一个让选择成真的动作。"]
        },
        "反对生产力债务：已毕事项清单的非凡之处": {
          short: "别只盯着没做完。把已经完成的事看见，能把亏欠感拉回现实。",
          reminder: "你不是一台清空任务的机器。你需要证据证明自己已经在活、在做。",
          quote: "文档介绍“已毕事项清单”：记录的不是计划今天完成的任务，而是今天到目前为止已经完成的任务。它会随时间变长，让你看见完成正在累积。",
          steps: ["打开一张空白清单。", "写下今天已经做完的 3 件小事。", "每完成一件事就追加，而不是只删除待办。"]
        },
        "信息过载：选择性阅读的艺术": {
          short: "把信息流看成河，不是必须清空的桶。",
          reminder: "你可以挑几样真正合意的内容，让其他内容流过去。",
          quote: "文档说：别把待看内容清单当成会渐渐装满、需要清空的桶，而要视作一条经过身边的河。内容消费也是活在当下，不必被收益焦虑吞掉。",
          steps: ["设一个 10 分钟阅读窗口。", "只挑 1 条真正想看的内容。", "关掉剩下的标签页，允许它们流走。"]
        },
        "你无法事事挂心：当世界一团糟时，如何保持理智": {
          short: "智慧的一部分，是知道今天可以忽略什么。",
          reminder: "关心世界不等于把整个世界塞进脑子。",
          quote: "文档引用威廉·詹姆斯：智慧的艺术在于知道该忽略什么。每天花十分钟了解新闻就够了，滚动浏览过久会耗尽本可用来行动的时间。",
          steps: ["给担忧设置 10 分钟边界。", "写下一个你能真实影响的小范围。", "把注意力收回到那件小事上。"]
        },
        "未来尚未来临：船到桥头自然直": {
          short: "未来会摧毁现在，尤其当你试图提前解决全部不确定性时。",
          reminder: "把今天能做的留给今天，把明天的桥留给明天。",
          quote: "文档写到：我们被渴望和恐惧束缚在不确定的未来中，剥夺了当下的平静和意义。未来尚未来临，别让它提前占领现在。",
          steps: ["写下你正在预演的未来。", "标出今天无法验证的部分。", "只处理今天能确认的一步。"]
        },
        "决策狩猎：选择穿越森林的路径": {
          short: "真正的决策需要行动让其他选项变远，哪怕动作很小。",
          reminder: "决定不是脑内宣布，而是现实里迈一步。",
          quote: "文档说：只有当你在现实中根据决策有所行动，让放弃的选择变得遥不可及时，你的决策才算真正的决策。哪怕很微小也算数。",
          steps: ["选一个方向，不再继续横向比较。", "做一个不可逆的小动作：发消息、预约、下单、提交。", "把它记进“已决策清单”。"]
        },
        "有始有终：终之魔力": {
          short: "完成会补充能量。未完成才常常让人疲惫。",
          reminder: "找一个能一口气做完的小闭环，而不是继续摊开更多可能性。",
          quote: "文档说：完工可以补充能量，而非耗尽能量。明确接下来几分钟或一两个小时能做完什么，然后全力以赴，直到达成。",
          steps: ["找一件 20 分钟内能收尾的事。", "只追求完成，不追求扩展。", "完成后停下，感受能量是否回来一点。"]
        },
        "寻找人生任务：响应现实呼唤": {
          short: "别问抽象人生意义，问现实现在要求你回应什么。",
          reminder: "你永远不会没有下一步可走。下一步通常从真实处境里冒出来。",
          quote: "文档说：人生任务从生活环境中涌现。你要凭借实际拥有的技能、资源和个性，在所处环境中完成它。问“当下的人生任务是什么”，是为了挑明逃避并开始行动。",
          steps: ["写下现实正在向你提出的一个要求。", "确认它难但并非不可能。", "做一个回应现实的小动作。"]
        },
        "到棚屋去：与恐惧对象为友": {
          short: "先面对现实，再行动。回避会让恐惧越滚越大。",

      }

      function renderFilters() {
        $("quickFilters").innerHTML = tags.map((tag) => `
          <button class="chip ${tag === state.tag ? "is-active" : ""}" data-tag="${tag}">${tag}</button>
        `).join("");
      }

      function renderDilemmas() {
        const visible = filteredDilemmas();
        $("dilemmaList").innerHTML = visible.length ? visible.map(([name, list]) => `
          <button class="dilemma ${name === state.activeDilemma ? "is-active" : ""}" data-dilemma="${name}">
            <span>${name}</span>
            <small>${list.length} 法</small>
          </button>
        `).join("") : '<div class="empty">没找到这个困扰。可以换个词，比如“担心”“分心”“任务”。</div>';
      }

      function renderHero() {
        const [name, list] = currentDilemma();
        $("heroTitle").textContent = name;
        $("statusChip").textContent = `已选：${name}`;
        $("methodCount").textContent = `${list.length} 个方法`;
        const leading = list.slice(0, 3).map((method) => methods[method]?.short || method).join("；");
        $("heroCopy").textContent = `${name}时，可以从这些方向松动：${leading}`;
      }

      function renderMethods() {
        const [, list] = currentDilemma();
        if (!list.includes(state.activeMethod)) state.activeMethod = list[0];
        $("methodGrid").innerHTML = list.map((title, index) => {
          const method = methods[title] || missingMethod(title);
          return `
            <button class="method-card ${title === state.activeMethod ? "is-active" : ""}" data-method="${title}">
              <span class="method-tag">方法 ${index + 1}</span>
              <h3>${escapeHtml(title)}</h3>
              <p>${escapeHtml(method.short)}</p>
            </button>
          `;
        }).join("");
      }

      function renderDetail() {
        const method = methods[state.activeMethod] || missingMethod(state.activeMethod);
        $("detail").innerHTML = `
          <div class="detail-grid">
            <div class="note">
              <h3>核心提醒</h3>
              <p>${escapeHtml(method.reminder)}</p>
            </div>
            <div class="quote">${escapeHtml(method.quote)}</div>
          </div>
          <div class="note">
            <h3>现在可以做</h3>
            <ol class="steps">
              ${method.steps.map((step) => `<li>${escapeHtml(step)}</li>`).join("")}
            </ol>
          </div>
        `;
      }

      function missingMethod(title) {
        return {
          short: "索引提到这个方法，但当前页面还没有正文摘录。",
          reminder: "先把标题当作线索，回到文档查看原文。",
          quote: `方法标题：${title}`,
          steps: ["回到原文找到对应章节。", "摘出一句最有用的话。", "把它改写成一个 5 分钟动作。"]
        };
      }

      function renderAll() {
        renderFilters();
        renderDilemmas();
        renderHero();
        renderMethods();
        renderDetail();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function toast(message) {
        $("toast").textContent = message;
        $("toast").classList.add("is-open");
        window.clearTimeout(toast.timer);
        toast.timer = window.setTimeout(() => $("toast").classList.remove("is-open"), 1800);
      }

      $("quickFilters").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-tag]");
        if (!button) return;
        state.tag = button.dataset.tag;
        renderAll();
      });

      $("dilemmaList").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-dilemma]");
        if (!button) return;
        state.activeDilemma = button.dataset.dilemma;
        state.activeMethod = currentDilemma()[1][0];
        renderAll();
      });

      $("methodGrid").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-method]");
        if (!button) return;
        state.activeMethod = button.dataset.method;
        renderAll();
        $("detail").scrollIntoView({ behavior: "smooth", block: "nearest" });
      });

      $("searchInput").addEventListener("input", (event) => {
        state.query = event.target.value;
        renderDilemmas();
      });

      $("randomPick").addEventListener("click", () => {
        const pool = filteredDilemmas();
        const pick = pool[Math.floor(Math.random() * pool.length)] || dilemmas[0];
        state.activeDilemma = pick[0];
        state.activeMethod = pick[1][0];
        renderAll();
        toast(`抽到了：${pick[0]}`);
      });

      $("copyPrompt").addEventListener("click", async () => {
        const [name] = currentDilemma();
        const method = methods[state.activeMethod] || missingMethod(state.activeMethod);
        const text = `我现在面对：${name}\n方法：${state.activeMethod}\n提醒：${method.reminder}\n第一步：${method.steps[0]}`;
        try {
          await navigator.clipboard.writeText(text);
          toast("今日提醒已复制。");
        } catch (error) {
          toast(text);
        }
      });

      $("copyLink").addEventListener("click", async () => {
        const url = window.location.href;
        try {
          await navigator.clipboard.writeText(url);
          toast(window.location.protocol === "file:"
            ? "已复制本机预览地址。部署后请复制公开网址。"
            : "网站链接已复制。");
        } catch (error) {
          toast(url);
        }
      });

      renderAll();
    </script>
  </body>
</html>
